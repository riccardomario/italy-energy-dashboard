name: Monthly deep refresh

on:
  schedule:
    # 06:00 UTC on the 1st of each month: re-fetch last 60 days to capture
    # late revisions (provisional -> final).
    - cron: "0 6 1 * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run deep update (60-day lookback)
        env:
          ENTSOE_API_TOKEN: ${{ secrets.ENTSOE_API_TOKEN }}
        run: |
          mkdir -p .streamlit
          printf 'ENTSOE_API_TOKEN = "%s"\n' "$ENTSOE_API_TOKEN" > .streamlit/secrets.toml
          python pipeline/update.py --lookback 60

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*.parquet data/last_update.json
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Monthly deep refresh $(date -u +%Y-%m-%d)"
            git push
          fi
